<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메타 레이밴 디스플레이 도슨트 테스트</title>
  <style>
    :root {
      /* 글래스 디스플레이를 600x600 정사각형으로 가정 */
      --safe: 45px;          /* 가장자리 안전영역 */
      --header-size: 40px;   /* 헤더 폰트 크기 */
      --body-size: 30px;     /* 본문 폰트 크기 */
      --scroll-duration: 60s; /* 한 번 흐르는 데 걸리는 시간 (콘텐츠 길이에 맞춰 JS에서 조정) */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      overflow: hidden;
    }

    /* 600x600 비율의 정사각형 스테이지 */
    #stage {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      max-width: 600px;
      max-height: 600px;
      background: #000000;
      overflow: hidden;
    }

    /* ── 대기 화면 ── */
    #waiting {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      padding: var(--safe);
      text-align: center;
    }
    .bigBtn {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      background: #1a1a1a;
      border: 2px solid #ffffff;
      border-radius: 16px;
      padding: 24px 32px;
      cursor: pointer;
      width: 100%;
      max-width: 440px;
    }
    .bigBtn:active { background: #333333; }
    #waitingMsg { font-size: 20px; color: #aaaaaa; }
    #waiting .title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }

    /* ── 주변 BLE 스캔 화면 ── */
    #scanner {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      padding: 24px;
      color: #fff;
    }
    #scanner .scanHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    #scanBack {
      font-size: 14px;
      color: #fff;
      background: #1a1a1a;
      border: 1px solid #666;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }
    #scanner .scanOpt { font-size: 14px; color: #bbb; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    #scanList { flex: 1; overflow-y: auto; }
    .scanItem { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #1c1c1c; }
    .scanItem .info { flex: 1; min-width: 0; }
    .scanItem .nm { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scanItem .mf { font-size: 12px; color: #8fb6ff; }
    .scanItem .bar { width: 90px; height: 9px; background: #222; border-radius: 5px; overflow: hidden; flex: none; }
    .scanItem .fill { display: block; height: 100%; background: #3ad36a; }
    .scanItem .val { width: 56px; text-align: right; font-size: 14px; color: #9a9a9a; flex: none; }
    #scanList .empty { color: #777; font-size: 16px; padding-top: 16px; text-align: center; }

    /* ── 글래스 디스플레이 모드 ── */
    #display {
      position: absolute;
      inset: 0;
      display: none;
    }
    #displayConnect {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: var(--safe);
      text-align: center;
    }
    .chanInfo { font-size: 14px; color: #888; }
    .chanInfo .chan { color: #bbb; }
    #displayMsg { font-size: 20px; color: #aaa; }

    /* ── 폰 리모컨 모드 ── */
    #remote {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      padding: 24px;
      color: #fff;
    }
    #remote .remoteHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    #remoteBack {
      font-size: 14px;
      color: #fff;
      background: #1a1a1a;
      border: 1px solid #666;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }
    #remoteGrid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 1fr;
      gap: 10px;
    }
    .remoteBtn {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      background: #1a1a1a;
      border: 2px solid #666;
      border-radius: 14px;
      cursor: pointer;
    }
    .remoteBtn:active { background: #333; }
    .remoteBtn.sent { border-color: #ffd24d; color: #ffd24d; background: #2a2410; }
    #remoteStatus { text-align: center; font-size: 16px; color: #9a9a9a; margin: 10px 0; }
    #btnClear {
      font-size: 16px;
      color: #ccc;
      background: #151515;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
    }

    /* D-pad 포커스 표시 (글래스) */
    .focusable:focus {
      outline: 3px solid #ffd24d;
      outline-offset: 2px;
    }

    /* ── 도슨트 화면 ── */
    #docent {
      position: absolute;
      inset: 0;
      display: none;          /* 스캔 시작 후 표시 */
      overflow: hidden;
    }
    /* 안전영역을 제외한 표시 영역 */
    #viewport {
      position: absolute;
      inset: var(--safe);
      overflow: hidden;
    }
    /* 위로 흐르는 콘텐츠 래퍼 */
    #scroller {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      will-change: transform;
    }
    .header-text {
      font-size: var(--header-size);
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 0.8em;
      word-break: keep-all;
    }
    .body-text {
      font-size: var(--body-size);
      font-weight: 400;
      line-height: 1.5;
      word-break: keep-all;
    }

    /* ── 디버그 패널 ── */
    #debugToggle {
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 10;
      font-size: 12px;
      color: #888;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
    }
    #debugPanel {
      position: fixed;
      top: 36px;
      right: 6px;
      z-index: 10;
      width: 240px;
      max-height: 80vh;
      overflow-y: auto;
      display: none;
      font-size: 12px;
      line-height: 1.5;
      color: #b6ffb6;
      background: rgba(0,0,0,0.8);
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px;
    }
    #debugPanel.show { display: block; }
    #debugPanel h4 { font-size: 12px; color: #fff; margin: 6px 0 4px; }
    #debugPanel .row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    #debugPanel .bid { width: 38px; color: #cfcfcf; }
    #debugPanel .bar { flex: 1; height: 9px; background: #222; border-radius: 5px; overflow: hidden; }
    #debugPanel .fill { display: block; height: 100%; width: 0; background: #3ad36a; transition: width 0.2s; }
    #debugPanel .val { width: 50px; text-align: right; color: #9a9a9a; }
    #debugPanel .row.current .bid { color: #ffd24d; font-weight: 700; }
    #debugPanel .row.current .fill { background: #ffd24d; }
    #debugPanel .row.candidate .bid { color: #7fd0ff; }
    #debugPanel .row.candidate .fill { background: #7fd0ff; }
    #debugPanel .sim { margin-top: 8px; border-top: 1px solid #2a2a2a; padding-top: 6px; }
    #debugPanel .hint2 { color: #777; font-weight: 400; }
    #debugPanel .simrow { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    #debugPanel .simrow .sl { width: 38px; color: #cfcfcf; }
    #debugPanel .simrow input[type=range] { flex: 1; }
    #debugPanel .opts { margin-top: 8px; border-top: 1px solid #2a2a2a; padding-top: 6px; color: #ccc; }
    #debugPanel label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #debugPanel .hint { color: #777; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="stage">
    <!-- 대기 화면 -->
    <div id="waiting">
      <div class="title">메타 디스플레이 테스트</div>
      <button id="btnDisplay" class="bigBtn focusable">① 글래스 디스플레이 모드</button>
      <button id="btnRemote" class="bigBtn focusable">② 폰 리모컨 모드</button>
      <button id="btnDocent" class="bigBtn focusable">③ 단독 도슨트 테스트</button>
      <button id="btnScanner" class="bigBtn focusable">④ 주변 BLE 스캔</button>
      <div id="waitingMsg">모드를 선택하세요</div>
    </div>

    <!-- 글래스 디스플레이 모드 (수신 전용) -->
    <div id="display">
      <div id="displayConnect">
        <div class="title">디스플레이 모드</div>
        <div class="chanInfo">채널: <span class="chan"></span></div>
        <button id="btnConnect" class="bigBtn focusable">연결 시작</button>
        <div id="displayMsg">연결을 눌러 신호를 기다립니다</div>
      </div>
    </div>

    <!-- 폰 리모컨 모드 (송신) -->
    <div id="remote">
      <div class="remoteHeader">
        <span>리모컨 <span class="chanInfo">채널: <span class="chan"></span></span></span>
        <button id="remoteBack" class="focusable">← 뒤로</button>
      </div>
      <div id="remoteGrid"></div>
      <div id="remoteStatus">버튼을 눌러 글래스로 전송</div>
      <button id="btnClear" class="focusable">대기(지우기) 전송</button>
    </div>

    <!-- 도슨트 화면 -->
    <div id="docent">
      <div id="viewport">
        <div id="scroller"></div>
      </div>
    </div>

    <!-- 주변 BLE 스캔 화면 -->
    <div id="scanner">
      <div class="scanHeader">
        <span>주변 BLE 기기 <span id="scanCount"></span></span>
        <button id="scanBack">← 뒤로</button>
      </div>
      <label class="scanOpt"><input type="checkbox" id="showAll" /> 이름·제조사 없는 기기도 표시</label>
      <div id="scanList"><div class="empty">스캔 준비 중…</div></div>
    </div>
  </div>

  <!-- 디버그 -->
  <button id="debugToggle">디버그 ▾</button>
  <div id="debugPanel">
    <h4>신호 / 근접도</h4>
    <div id="deviceList">—</div>
    <div class="sim">
      <h4>근접 시뮬레이터 <span class="hint2">(BLE 없을 때)</span></h4>
      <div id="simSliders"></div>
    </div>
    <div class="opts">
      <label><input type="checkbox" id="ttsToggle" checked /> TTS 켜기</label>
      <div class="hint">슬라이더를 올리면 그 비콘이 가까워집니다</div>
      <div class="hint">키보드 1~8: 해당 비콘 즉시 진입</div>
      <div class="hint" id="bleStatus">BLE: 대기 중</div>
    </div>
  </div>

  <script>
    'use strict';

    /* ─────────────────────────────────────────────
       1. 데이터: 비콘 01~08 자동 생성
       ───────────────────────────────────────────── */
    const beacons = Array.from({ length: 8 }, (_, i) => {
      const id = String(i + 1).padStart(2, '0');
      return {
        id,
        title: `${id}번 BLE에 왔습니다`,
        bodyLine: `${id}테스트용 스크립트`,
      };
    });
    const beaconById = Object.fromEntries(beacons.map(b => [b.id, b]));

    const BODY_REPEAT = 50; // 본문 줄 반복 횟수 (충분히 긴 스크롤 콘텐츠)

    /* ─────────────────────────────────────────────
       2. DOM 참조
       ───────────────────────────────────────────── */
    const waitingEl   = document.getElementById('waiting');
    const waitingMsg  = document.getElementById('waitingMsg');
    const btnDocent   = document.getElementById('btnDocent');
    const btnScanner  = document.getElementById('btnScanner');
    const docentEl    = document.getElementById('docent');
    const scrollerEl  = document.getElementById('scroller');
    const viewportEl  = document.getElementById('viewport');
    const scannerEl   = document.getElementById('scanner');
    const scanListEl  = document.getElementById('scanList');
    const scanCountEl = document.getElementById('scanCount');
    const scanBackBtn = document.getElementById('scanBack');
    const showAllChk  = document.getElementById('showAll');
    const debugToggle = document.getElementById('debugToggle');
    const debugPanel  = document.getElementById('debugPanel');
    const deviceListEl= document.getElementById('deviceList');
    const simSlidersEl= document.getElementById('simSliders');
    const ttsToggle   = document.getElementById('ttsToggle');
    const bleStatus   = document.getElementById('bleStatus');
    // 신규: 디스플레이/리모컨 모드
    const btnDisplay  = document.getElementById('btnDisplay');
    const btnRemote   = document.getElementById('btnRemote');
    const displayEl   = document.getElementById('display');
    const displayConnect = document.getElementById('displayConnect');
    const displayMsg  = document.getElementById('displayMsg');
    const btnConnect  = document.getElementById('btnConnect');
    const remoteEl    = document.getElementById('remote');
    const remoteGrid  = document.getElementById('remoteGrid');
    const remoteStatus= document.getElementById('remoteStatus');
    const remoteBack  = document.getElementById('remoteBack');
    const btnClear    = document.getElementById('btnClear');

    // 폰↔글래스 공유 채널 (ntfy.sh). ?ch= 로 덮어쓰기 가능
    const CHANNEL = new URLSearchParams(location.search).get('ch') || 'metadisplay-limjy-7f3a2k';
    document.querySelectorAll('.chan').forEach(el => { el.textContent = CHANNEL; });

    /* ─────────────────────────────────────────────
       3. 상태
       ───────────────────────────────────────────── */
    let currentBeaconId = null;   // 현재 화면에 표시 중인 비콘
    let scanning = false;
    let scanInstance = null;      // requestLEScan() 핸들
    let rafId = null;             // 스크롤 애니메이션
    const SCROLL_SPEED = 40;      // px/초 (텔레프롬프터 속도)

    // 실제 BLE RSSI 집계: { "01": { rssi, lastSeen }, ... }
    const seen = {};
    const STALE_MS = 4000;        // 이 시간 이상 안 보이면 후보에서 제외
    const CONFIRM_MS = 2500;      // 최강 신호가 이만큼 유지돼야 "현재 위치" 확정

    let candidateId = null;       // 현재 최강 후보
    let candidateSince = 0;       // 후보가 된 시각

    // 근접 시뮬레이터: 슬라이더로 만든 가짜 RSSI { "01": -55, ... }
    const simRssi = {};
    const simInputs = {};         // id -> <input range>
    const SIM_OFF = -100;         // 이 값이면 신호 없음(꺼짐)으로 취급

    // RSSI(dBm)를 0~100% 근접도로 변환 (-40=매우 가까움, -95=멈)
    function rssiToProximity(rssi) {
      const NEAR = -40, FAR = -95;
      const pct = ((rssi - FAR) / (NEAR - FAR)) * 100;
      return Math.max(0, Math.min(100, Math.round(pct)));
    }

    // 실제 BLE + 시뮬레이터를 합친 현재 신호 맵 { id: rssi }
    function getSignals() {
      const now = performance.now();
      const out = {};
      for (const id of Object.keys(seen)) {
        if (now - seen[id].lastSeen <= STALE_MS) out[id] = seen[id].rssi;
      }
      for (const id of Object.keys(simRssi)) {
        if (simRssi[id] > SIM_OFF) {
          out[id] = (id in out) ? Math.max(out[id], simRssi[id]) : simRssi[id];
        }
      }
      return out;
    }

    /* ─────────────────────────────────────────────
       4. 콘텐츠 렌더링 + 스크롤
       ───────────────────────────────────────────── */
    function buildContent(beacon) {
      scrollerEl.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'header-text';
      header.textContent = beacon.title;
      scrollerEl.appendChild(header);

      // bodyLine을 여러 번 반복해 긴 스크롤 콘텐츠 생성
      const body = document.createElement('div');
      body.className = 'body-text';
      const lines = [];
      for (let i = 0; i < BODY_REPEAT; i++) lines.push(beacon.bodyLine);
      body.innerHTML = lines.join('<br>');
      scrollerEl.appendChild(body);
    }

    function startScroll() {
      cancelAnimationFrame(rafId);
      // 시작 위치: 첫 줄이 표시영역 위쪽에 오도록 0에서 시작
      let y = 0;
      let last = performance.now();
      const viewportH = viewportEl.clientHeight;

      function frame(now) {
        const dt = (now - last) / 1000;
        last = now;
        y += SCROLL_SPEED * dt;
        scrollerEl.style.transform = `translateY(${-y}px)`;

        const contentH = scrollerEl.scrollHeight;
        // 콘텐츠가 완전히 위로 빠져나가면 처음부터 다시
        if (y > contentH + viewportH) {
          y = -viewportH * 0; // 곧바로 처음부터 (위에서 다시 등장)
          y = 0;
        }
        rafId = requestAnimationFrame(frame);
      }
      rafId = requestAnimationFrame(frame);
    }

    /* ─────────────────────────────────────────────
       5. TTS / 비프음
       ───────────────────────────────────────────── */
    let audioCtx = null;
    function beep() {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.2;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.18);
      } catch (e) { /* 무음 환경 무시 */ }
    }

    function speak(beacon) {
      if (!('speechSynthesis' in window)) { beep(); return; }
      window.speechSynthesis.cancel();
      // 헤더 + 본문 몇 줄 정도를 읽음 (전체 50회는 과하므로 압축)
      const text = `${beacon.title}. ${beacon.bodyLine}. ${beacon.bodyLine}. ${beacon.bodyLine}.`;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      u.rate = 1.0;
      const koVoice = window.speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('ko'));
      if (koVoice) u.voice = koVoice;
      window.speechSynthesis.speak(u);
    }

    /* ─────────────────────────────────────────────
       6. 현재 위치 전환
       ───────────────────────────────────────────── */
    function enterBeacon(id) {
      if (id === currentBeaconId) return;
      const beacon = beaconById[id];
      if (!beacon) return;

      currentBeaconId = id;
      buildContent(beacon);
      startScroll();          // 스크롤 처음부터 다시 시작

      if (ttsToggle.checked) {
        speak(beacon);
      } else {
        beep();
      }
      updateDebug();
    }

    /* ─────────────────────────────────────────────
       7. BLE 스캔 공통 (requestLEScan)
       ───────────────────────────────────────────── */
    // 현재 붙어 있는 advertisement 핸들러 (모드 전환 시 교체)
    let advHandler = null;
    let evalStarted = false;

    function bleSupported() {
      return !!(navigator.bluetooth && navigator.bluetooth.requestLEScan);
    }

    // 스캔 시작 + 지정 핸들러 부착. 성공 시 true.
    async function startLEScan(handler) {
      stopLEScan();
      scanInstance = await navigator.bluetooth.requestLEScan({ acceptAllAdvertisements: true });
      advHandler = handler;
      navigator.bluetooth.addEventListener('advertisementreceived', advHandler);
      return true;
    }

    function stopLEScan() {
      if (advHandler) {
        navigator.bluetooth.removeEventListener('advertisementreceived', advHandler);
        advHandler = null;
      }
      if (scanInstance) { try { scanInstance.stop(); } catch (e) {} scanInstance = null; }
    }

    /* ─────────────────────────────────────────────
       7-A. 모드 ① 도슨트 스크립트 테스트
       ───────────────────────────────────────────── */
    async function startDocent() {
      waitingEl.style.display = 'none';
      docentEl.style.display = 'block';
      scanning = true;

      // 사용자 제스처 안에서 오디오 컨텍스트/보이스 워밍업
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

      // 후보 평가 루프는 BLE 지원 여부와 무관하게 항상 동작
      // (시뮬레이터 슬라이더만으로도 근접 판정이 굴러가도록)
      if (!evalStarted) { setInterval(evaluateCandidates, 500); evalStarted = true; }

      if (!bleSupported()) {
        bleStatus.textContent = 'BLE: requestLEScan 미지원 (시뮬레이터 사용)';
        debugPanel.classList.add('show'); // 슬라이더가 바로 보이도록 패널 펼침
        return;
      }
      try {
        await startLEScan(onDocentAdvertisement);
        bleStatus.textContent = 'BLE: 스캔 중';
      } catch (e) {
        bleStatus.textContent = 'BLE 오류: ' + e.message;
        debugPanel.classList.add('show');
      }
    }

    function onDocentAdvertisement(event) {
      const name = event.device && event.device.name;
      if (!name) return;
      const id = name.trim();
      if (!beaconById[id]) return;     // 01~08 만 관심
      seen[id] = { rssi: event.rssi, lastSeen: performance.now() };
      updateDebug();
    }

    /* ─────────────────────────────────────────────
       7-B. 모드 ② 주변 BLE 스캔
       ───────────────────────────────────────────── */
    // 알려진 제조사 Company ID (Bluetooth SIG)
    const COMPANY = {
      0x004C: 'Apple', 0x0075: 'Samsung', 0x0006: 'Microsoft', 0x00E0: 'Google',
      0x0087: 'Garmin', 0x0157: 'Huawei', 0x038F: 'Xiaomi', 0x01D7: 'Fitbit',
      0x000F: 'Broadcom', 0x0059: 'Nordic', 0x004F: 'Logitech', 0x00D2: 'Sony',
      0x0499: 'Ruuvi', 0x0118: 'Tile',
    };
    const scanDevices = {};       // device.id -> { name, manuf, rssi, lastSeen }
    const SCAN_STALE_MS = 12000;  // 이 시간 이상 안 보이면 목록에서 제거
    let scanRenderTimer = null;

    async function startScanner() {
      waitingEl.style.display = 'none';
      scannerEl.style.display = 'flex';

      if (!bleSupported()) {
        scanListEl.innerHTML = '<div class="empty">이 브라우저는 requestLEScan을 지원하지 않습니다.<br>chrome://flags에서 Experimental Web Platform features를 켜주세요.</div>';
        return;
      }
      try {
        await startLEScan(onScanAdvertisement);
        scanListEl.innerHTML = '<div class="empty">주변 기기를 찾는 중…</div>';
        scanRenderTimer = setInterval(renderScan, 600);
      } catch (e) {
        scanListEl.innerHTML = '<div class="empty">스캔 실패: ' + e.message + '</div>';
      }
    }

    function onScanAdvertisement(event) {
      const d = event.device;
      const id = d.id || (d.name || Math.random().toString());
      let manuf = '';
      if (event.manufacturerData) {
        for (const key of event.manufacturerData.keys()) {
          manuf = COMPANY[key] || ('제조사 0x' + key.toString(16).padStart(4, '0'));
          break; // 첫 번째 회사 ID만 사용
        }
      }
      scanDevices[id] = {
        name: (d.name || event.name || '').trim(),
        manuf,
        rssi: event.rssi,
        lastSeen: performance.now(),
      };
    }

    function renderScan() {
      const now = performance.now();
      for (const id of Object.keys(scanDevices)) {
        if (now - scanDevices[id].lastSeen > SCAN_STALE_MS) delete scanDevices[id];
      }
      let list = Object.values(scanDevices);
      // 기본: 이름이나 제조사가 식별되는 실제 기기만 (익명 쓰레기값 제외)
      if (!showAllChk.checked) list = list.filter(d => d.name || d.manuf);
      list.sort((a, b) => b.rssi - a.rssi); // 가까운 순

      scanCountEl.textContent = `(${list.length})`;
      if (list.length === 0) {
        scanListEl.innerHTML = '<div class="empty">식별되는 기기가 아직 없습니다…<br>(맥북/워치 등은 이름 대신 제조사로 표시될 수 있어요)</div>';
        return;
      }
      scanListEl.innerHTML = list.map(d => {
        const label = d.name || (d.manuf ? d.manuf + ' 기기' : '(이름 없음)');
        const sub = (d.name && d.manuf) ? d.manuf : '';
        const pct = rssiToProximity(d.rssi);
        return '<div class="scanItem">'
          + '<div class="info"><div class="nm">' + escapeHtml(label) + '</div>'
          + (sub ? '<div class="mf">' + escapeHtml(sub) + '</div>' : '')
          + '</div>'
          + '<span class="bar"><span class="fill" style="width:' + pct + '%"></span></span>'
          + '<span class="val">' + d.rssi + 'dBm</span>'
          + '</div>';
      }).join('');
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function backToWaiting() {
      stopLEScan();
      if (scanRenderTimer) { clearInterval(scanRenderTimer); scanRenderTimer = null; }
      for (const id of Object.keys(scanDevices)) delete scanDevices[id];
      scannerEl.style.display = 'none';
      waitingEl.style.display = 'flex';
    }

    function evaluateCandidates() {
      const now = performance.now();
      // 오래된 실제 BLE 항목 제거
      for (const id of Object.keys(seen)) {
        if (now - seen[id].lastSeen > STALE_MS) delete seen[id];
      }
      // 실제 + 시뮬레이터 합친 신호 중 최강 후보 선택
      const sig = getSignals();
      let best = null;
      for (const id of Object.keys(sig)) {
        if (!best || sig[id] > sig[best]) best = id;
      }
      if (!best) { candidateId = null; updateDebug(); return; }

      if (best !== candidateId) {
        candidateId = best;
        candidateSince = now;
      } else if (now - candidateSince >= CONFIRM_MS) {
        // 일정 시간 동일 후보가 최강이면 확정
        enterBeacon(best);
      }
      updateDebug();
    }

    /* ─────────────────────────────────────────────
       8. 디버그 패널
       ───────────────────────────────────────────── */
    function updateDebug() {
      const sig = getSignals();
      // 8개 비콘을 항상 막대로 표시 (신호 없으면 빈 막대)
      deviceListEl.innerHTML = beacons.map(b => {
        const id = b.id;
        const has = id in sig;
        const pct = has ? rssiToProximity(sig[id]) : 0;
        let cls = 'row';
        let mark = '';
        if (id === currentBeaconId) { cls += ' current'; mark = ' ●'; }      // 확정(현재 표시 중)
        else if (id === candidateId) { cls += ' candidate'; mark = ' ◌'; }   // 후보(곧 확정)
        const val = has ? `${sig[id]}dBm` : '—';
        return `<div class="${cls}">`
          + `<span class="bid">${id}${mark}</span>`
          + `<span class="bar"><span class="fill" style="width:${pct}%"></span></span>`
          + `<span class="val">${val}</span>`
          + `</div>`;
      }).join('');
    }

    // 시뮬레이터 슬라이더 8개 생성 (위로 올릴수록 그 비콘이 가까워짐)
    function buildSimSliders() {
      beacons.forEach(b => {
        const row = document.createElement('div');
        row.className = 'simrow';
        const label = document.createElement('span');
        label.className = 'sl';
        label.textContent = b.id;
        const input = document.createElement('input');
        input.type = 'range';
        input.min = SIM_OFF;     // 맨 왼쪽 = 꺼짐(신호 없음)
        input.max = -40;         // 맨 오른쪽 = 매우 가까움
        input.step = 1;
        input.value = SIM_OFF;
        input.addEventListener('input', () => {
          simRssi[b.id] = Number(input.value);
          updateDebug();
        });
        simInputs[b.id] = input;
        row.appendChild(label);
        row.appendChild(input);
        simSlidersEl.appendChild(row);
      });
    }
    buildSimSliders();
    updateDebug();

    debugToggle.addEventListener('click', () => {
      debugPanel.classList.toggle('show');
    });

    /* ─────────────────────────────────────────────
       8-A. 글래스 디스플레이 모드 (ntfy 구독, 수신 전용)
       ───────────────────────────────────────────── */
    let ws = null;
    let wsReconnect = null;

    function startDisplay() {
      waitingEl.style.display = 'none';
      displayEl.style.display = 'block';
      setTimeout(() => { try { btnConnect.focus(); } catch (e) {} }, 0); // D-pad 포커스
    }

    function connectDisplay() {
      // TTS/오디오 베스트에포트 워밍업 (사용자 제스처 안)
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      btnConnect.style.display = 'none';
      displayMsg.textContent = '채널 연결 중…';
      openWS();
    }

    function openWS() {
      try {
        ws = new WebSocket('wss://ntfy.sh/' + encodeURIComponent(CHANNEL) + '/ws?since=10m');
      } catch (e) { scheduleReconnect(); return; }

      ws.addEventListener('open', () => {
        displayMsg.textContent = '연결됨 — 신호 대기 중…';
      });
      ws.addEventListener('message', (ev) => {
        let data;
        try { data = JSON.parse(ev.data); } catch (e) { return; }
        if (data.event !== 'message') return;           // open/keepalive 무시
        const id = (data.message || '').trim();
        if (id === 'off') { displayIdle(); return; }
        if (!beaconById[id]) return;
        // 도슨트 화면으로 전환 후 기존 로직 재사용
        displayConnect.style.display = 'none';
        docentEl.style.display = 'block';
        enterBeacon(id);
      });
      ws.addEventListener('close', scheduleReconnect);
      ws.addEventListener('error', () => { try { ws.close(); } catch (e) {} });
    }

    function scheduleReconnect() {
      if (wsReconnect) return;
      wsReconnect = setTimeout(() => { wsReconnect = null; openWS(); }, 2000);
    }

    // "대기(지우기)" 수신 시 화면 비우고 대기 표시
    function displayIdle() {
      cancelAnimationFrame(rafId);
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      currentBeaconId = null;
      docentEl.style.display = 'none';
      displayConnect.style.display = 'flex';
      displayMsg.textContent = '연결됨 — 신호 대기 중…';
    }

    /* ─────────────────────────────────────────────
       8-B. 폰 리모컨 모드 (ntfy 발행, 송신)
       ───────────────────────────────────────────── */
    function startRemote() {
      waitingEl.style.display = 'none';
      remoteEl.style.display = 'flex';
    }

    function buildRemoteGrid() {
      beacons.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'remoteBtn focusable';
        btn.textContent = b.id;
        btn.addEventListener('click', () => sendBeacon(b.id, btn));
        remoteGrid.appendChild(btn);
      });
    }

    async function sendBeacon(id, btn) {
      remoteGrid.querySelectorAll('.remoteBtn').forEach(x => x.classList.remove('sent'));
      if (btn) btn.classList.add('sent');
      remoteStatus.textContent = '전송 중… ' + id;
      try {
        await fetch('https://ntfy.sh/' + encodeURIComponent(CHANNEL), { method: 'POST', body: id });
        remoteStatus.textContent = (id === 'off') ? '대기 신호 전송됨' : ('전송됨 → ' + id + '번 BLE');
      } catch (e) {
        remoteStatus.textContent = '전송 실패: ' + e.message;
      }
    }

    function remoteToWaiting() {
      remoteEl.style.display = 'none';
      waitingEl.style.display = 'flex';
    }

    buildRemoteGrid();

    /* ─────────────────────────────────────────────
       9. 테스트 모드: 키보드 1~8
       ───────────────────────────────────────────── */
    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '8') {
        const id = String(Number(e.key)).padStart(2, '0');
        // 시뮬레이션: 해당 비콘을 최강으로 만들고 즉시 진입
        simRssi[id] = -40;
        if (simInputs[id]) simInputs[id].value = -40;
        // 스캔 화면이면 도슨트 모드로 전환
        if (scannerEl.style.display !== 'none' && scannerEl.style.display !== '') backToWaiting();
        waitingEl.style.display = 'none';
        docentEl.style.display = 'block';
        enterBeacon(id);
      }
    });

    /* ─────────────────────────────────────────────
       10. 시작 — 메인 화면 두 버튼
       ───────────────────────────────────────────── */
    btnDisplay.addEventListener('click', startDisplay);
    btnConnect.addEventListener('click', connectDisplay);
    btnRemote.addEventListener('click', startRemote);
    remoteBack.addEventListener('click', remoteToWaiting);
    btnClear.addEventListener('click', () => sendBeacon('off', null));
    btnDocent.addEventListener('click', startDocent);
    btnScanner.addEventListener('click', startScanner);
    scanBackBtn.addEventListener('click', backToWaiting);
    showAllChk.addEventListener('change', renderScan);
  </script>
</body>
</html>
